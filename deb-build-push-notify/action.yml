name: Build push deb and notify
description: Build a deb package, push it on specified repository and notify on mattermost

inputs:
  REPOSITORY_URL:
    description: 'URL of the repository'
    required: true
  REPOSITORY_LOGIN:
    description: 'Login for the repository'
    required: true
  REPOSITORY_PASSWORD:
    description: 'Password for the repository'
    required: true
  PACKAGE_NAME:
    description: 'Name of the package to build'
    required: true
  PACKAGE_INSTALL_PATH:
    description: 'Path to install package'
    required: true
    default: '/usr/lib/python3/dist-packages'
  PACKAGE_VERSION:
    description: 'Package version'
    required: true
  PACKAGE_DEPENDENCY:
    description: 'Package dependency'
    required: true
    default: 'passerelle'
  SIGNER_KEY_ID:
    description: 'ID of the key to sign deb package'
    required: true
    default: '9D4C79E197D914CF60C05332C0025EEBC59B875B'
  SIGNER_KEY:
    description: 'Key to sign deb package (base64 encoded)'
    required: true
    default: ''
  SIGNER_KEY_PASSPHRASE:
    description: 'Passphrase to sign deb package'
    required: true
  MATTERMOST_WEBHOOK_URL:
    description: 'Webhook URL to send notifications on Mattermost, if not provided, notifications will not be sent'
    required: false

runs:
  using: 'composite'
  steps:
    - name: 'Install ar, curl, debsigs, jq, python3-pip and ruby-dev'
      run: |
        if which ar > /dev/null && which curl > /dev/null && which debsigs > /dev/null && which jq > /dev/null && which pip3 > /dev/null && which gem > /dev/null; then
          echo "Packages are already installed"
        else
          sudo apt-get update && sudo apt-get install -y binutils curl debsigs jq python3-pip ruby-dev
        fi
      shell: bash
    - name: 'Install fpm'
      run: |
        if which fpm > /dev/null; then
          echo "fpm is already installed"
        else
          sudo gem install fpm -v 1.15.1
        fi
      shell: bash
    - name: 'Install signing key'
      env:
        SIGNER_KEY: ${{ inputs.SIGNER_KEY }}
        SIGNER_KEY_PASSPHRASE: ${{ inputs.SIGNER_KEY_PASSPHRASE }}
      shell: bash
      run: |
        KEY_FILE=$(mktemp)
        chmod 600 "$KEY_FILE"
        trap "rm -f '$KEY_FILE'" EXIT
        echo "$SIGNER_KEY" > "$KEY_FILE"
        base64 -d "$KEY_FILE" | gpg --passphrase "$SIGNER_KEY_PASSPHRASE" --pinentry-mode loopback --import
    - name: 'Build package'
      env:
        PACKAGE_NAME: ${{ inputs.PACKAGE_NAME }}
        PACKAGE_VERSION: ${{ inputs.PACKAGE_VERSION }}
        PACKAGE_INSTALL_PATH: ${{ inputs.PACKAGE_INSTALL_PATH }}
        PACKAGE_DEPENDENCY: ${{ inputs.PACKAGE_DEPENDENCY }}
      run: |
        fpm -a amd64 \
          --python-bin python3 \
          --python-pip pip3 \
          --python-package-name-prefix python3 \
          -n "$PACKAGE_NAME" \
          -s python \
          -t deb \
          -v "$PACKAGE_VERSION" \
          --python-install-lib "$PACKAGE_INSTALL_PATH" \
          -d "$PACKAGE_DEPENDENCY" \
          --no-auto-depends \
          setup.py
      shell: bash
    - name: 'Sign package'
      env:
        SIGNER_KEY_PASSPHRASE: ${{ inputs.SIGNER_KEY_PASSPHRASE }}
        SIGNER_KEY_ID: ${{ inputs.SIGNER_KEY_ID }}
        PACKAGE_NAME: ${{ inputs.PACKAGE_NAME }}
        PACKAGE_VERSION: ${{ inputs.PACKAGE_VERSION }}
      run: |
        mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
        printf 'allow-preset-passphrase\nallow-loopback-pinentry\n' > ~/.gnupg/gpg-agent.conf
        gpgconf --kill gpg-agent
        gpg-connect-agent reloadagent /bye
        KEY_GRIP=$(gpg --with-keygrip --list-secret-keys '${{ inputs.SIGNER_KEY_ID }}' | awk '/Keygrip/{print $3; exit}')
        echo '${{ inputs.SIGNER_KEY_PASSPHRASE }}' | "$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase" --preset "$KEY_GRIP"
        debsigs --sign=origin -k ${{ inputs.SIGNER_KEY_ID }} \
          ${{ inputs.PACKAGE_NAME }}_${{ inputs.PACKAGE_VERSION }}_amd64.deb
      shell: bash
    - name: 'Upload package'
      env:
        REPOSITORY_LOGIN: ${{ inputs.REPOSITORY_LOGIN }}
        REPOSITORY_PASSWORD: ${{ inputs.REPOSITORY_PASSWORD }}
        REPOSITORY_URL: ${{ inputs.REPOSITORY_URL }}
        PACKAGE_NAME: ${{ inputs.PACKAGE_NAME }}
        PACKAGE_VERSION: ${{ inputs.PACKAGE_VERSION }}
      run: |
        NETRC_FILE="$(mktemp)"
        chmod 0600 "$NETRC_FILE"
        REPO_HOST="$(echo "$REPOSITORY_URL" | sed 's|https\?://||' | cut -d/ -f1)"
        printf 'machine %s login %s password %s\n' \
          "$REPO_HOST" "$REPOSITORY_LOGIN" "$REPOSITORY_PASSWORD" > "$NETRC_FILE"
        curl \
          --netrc-file "$NETRC_FILE" \
          --fail -X POST -H Content-Type:multipart/form-data \
          --data-binary @"${PACKAGE_NAME}_${PACKAGE_VERSION}_amd64.deb" \
          "$REPOSITORY_URL"
        rm -f "$NETRC_FILE"
      shell: bash
    - name : Send notification on Mattermost
      if: ${{ inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        PACKAGE_NAME: ${{ inputs.PACKAGE_NAME }}
        PACKAGE_VERSION: ${{ inputs.PACKAGE_VERSION }}
        GITHUB_BRANCH: ${{ github.ref_name }}
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
      run: |
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="Build and push of $PACKAGE_NAME $PACKAGE_VERSION.deb OK (Branch : $GITHUB_BRANCH) . [Click here to see job on GitHub]($JOB_URL) "
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
    - name : Send failure notification on Mattermost
      if: ${{ failure() && inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        PACKAGE_NAME: ${{ inputs.PACKAGE_NAME }}
        PACKAGE_VERSION: ${{ inputs.PACKAGE_VERSION }}
        GITHUB_BRANCH: ${{ github.ref_name }}
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
      run: |
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="Error : cannot build deb $PACKAGE_NAME $PACKAGE_VERSION.deb  (Branch : $GITHUB_BRANCH) . [Click here to see job on GitHub]($JOB_URL)"
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
