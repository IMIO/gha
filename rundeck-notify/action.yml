name: Call rundeck job and notify
description: Call a rundeck job and notify on Mattermost
inputs:
  RUNDECK_URL:
    description: 'URL of the Rundeck server'
    required: true
  RUNDECK_TOKEN:
    description: 'Auth token to call Rundeck job'
    required: true
  RUNDECK_JOB_ID:
    description: 'ID of the Rundeck job to call'
    required: true
  MATTERMOST_WEBHOOK_URL:
    description: 'Webhook URL to send notifications on Mattermost, if not provided, notifications will not be sent'
    required: false
  RUNDECK_PARAMETERS:
    description: 'Parameters to pass to the Rundeck job'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Install curl and jq
      run: |
        if which curl > /dev/null && which jq > /dev/null; then
          echo "curl and jq are already installed"
        else
          sudo apt-get update && sudo apt-get install -y curl jq
        fi
      shell: bash
    - name: Call Rundeck job
      id: call-rundeck-job
      env:
        RUNDECK_TOKEN: ${{ inputs.RUNDECK_TOKEN }}
        RUNDECK_URL: ${{ inputs.RUNDECK_URL }}
        RUNDECK_JOB_ID: ${{ inputs.RUNDECK_JOB_ID }}
        RUNDECK_PARAMETERS: ${{ inputs.RUNDECK_PARAMETERS }}
      run: |
        params=()
        eval "params=($RUNDECK_PARAMETERS)"
        curl --fail-with-body "${params[@]}" -H "X-Rundeck-Auth-Token: $RUNDECK_TOKEN" "$RUNDECK_URL/api/18/job/$RUNDECK_JOB_ID/run/" -o rundeck-response.json
        echo "JOB_NAME=$(jq -r .job.name rundeck-response.json)" >> "$GITHUB_OUTPUT"
        echo "JOB_EXECUTION_PERMALINK=$(jq -r .permalink rundeck-response.json)" >> "$GITHUB_OUTPUT"
      shell: bash
    - name : Send notification on Mattermost
      if: ${{ inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
        RUNDECK_JOB_NAME: ${{ steps.call-rundeck-job.outputs.JOB_NAME }}
        RUNDECK_JOB_PERMALINK: ${{ steps.call-rundeck-job.outputs.JOB_EXECUTION_PERMALINK }}
      run: |
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="Rundeck job [$RUNDECK_JOB_NAME]($RUNDECK_JOB_PERMALINK) has been successfully executed by [GitHub workflow $GITHUB_WORKFLOW]($JOB_URL) on repository [$GITHUB_REPOSITORY]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY)"
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
    - name : Send failure notification on Mattermost
      if: ${{ failure() && inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
        RUNDECK_JOB_NAME: ${{ steps.call-rundeck-job.outputs.JOB_NAME }}
        RUNDECK_JOB_PERMALINK: ${{ steps.call-rundeck-job.outputs.JOB_EXECUTION_PERMALINK }}
      run: |
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="Error : there was an error in execution of Rundeck job [$RUNDECK_JOB_NAME]($RUNDECK_JOB_PERMALINK) by [GitHub workflow $GITHUB_WORKFLOW]($JOB_URL) on repository [$GITHUB_REPOSITORY]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY)"
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
