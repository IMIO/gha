name: Notify on Mattermost
description: Send a rich color-coded notification to a Mattermost webhook
inputs:
  MATTERMOST_WEBHOOK_URL:
    description: 'Webhook URL to send notification on Mattermost. If empty, notification is skipped.'
    required: false
    default: ''
  TITLE:
    description: 'Short notification title (e.g. "Docker Build & Push")'
    required: true
  BODY:
    description: 'Notification body text (Markdown, newlines supported)'
    required: false
    default: ''
  STATUS:
    description: 'Job outcome: success or failure'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Send notification on Mattermost
      env:
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
        MM_TITLE: ${{ inputs.TITLE }}
        MM_BODY: ${{ inputs.BODY }}
        MM_STATUS: ${{ inputs.STATUS }}
        MM_ACTOR: ${{ github.actor }}
      run: |
        if [ -z "$WEBHOOK_URL" ]; then
          echo "Mattermost notification skipped: no webhook URL provided"
          exit 0
        fi
        if ! command -v curl > /dev/null 2>&1; then
          sudo apt-get update -q && sudo apt-get install -y -q curl
        fi
        if [ "$MM_STATUS" = "success" ]; then
          MM_COLOR="#36a64f"; MM_EMOJI=":white_check_mark:"
        else
          MM_COLOR="#e01e5a"; MM_EMOJI=":x:"
        fi
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        ACTOR_LINE="**Author**: $MM_ACTOR"
        if [ -n "$MM_BODY" ]; then
          FULL_BODY="$ACTOR_LINE"$'\n'"$MM_BODY"$'\n'"[View run on GitHub]($JOB_URL)"
        else
          FULL_BODY="$ACTOR_LINE"$'\n'"[View run on GitHub]($JOB_URL)"
        fi
        MM_TITLE_ESC=$(printf '%s' "$MM_TITLE" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read())[1:-1])")
        MM_BODY_ESC=$(printf '%s' "$FULL_BODY" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read())[1:-1])")
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"GitHub Actions\",\"icon_emoji\":\":github:\",\"attachments\":[{\"color\":\"$MM_COLOR\",\"pretext\":\"$MM_EMOJI **$MM_TITLE_ESC** — $GITHUB_REPOSITORY\",\"text\":\"$MM_BODY_ESC\"}]}")
        CURL_EXIT=$?
        if [ $CURL_EXIT -ne 0 ] || [ "${HTTP_STATUS:-0}" -lt 200 ] || [ "${HTTP_STATUS:-0}" -gt 299 ]; then
          echo "Mattermost notification failed: HTTP $HTTP_STATUS (curl exit $CURL_EXIT) for $WEBHOOK_URL"
          exit 1
        fi
        echo "Mattermost notification: HTTP $HTTP_STATUS"
      shell: bash
