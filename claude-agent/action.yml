name: Claude agent
description: Run a Claude Code agent with a given prompt, optionally focusing on specific files. Thin wrapper around anthropics/claude-code-action with sensible CI defaults.

inputs:
  PROMPT:
    description: 'Instructions for Claude'
    required: true
  FILES:
    description: 'Newline-separated list of file paths to expose to Claude (appended to the prompt as context)'
    required: false
    default: ''
  ANTHROPIC_API_KEY:
    description: 'Anthropic API key (pass secrets.ANTHROPIC_API_KEY from the calling workflow)'
    required: true
  MODEL:
    description: 'Claude model ID'
    required: false
    default: 'claude-sonnet-4-6'
  GITHUB_TOKEN:
    description: 'GitHub token forwarded to Claude for GitHub API operations (e.g. creating security advisories). Requires the appropriate permissions in the calling workflow (e.g. repository-advisories: write).'
    required: false
    default: ''
  ALLOWED_TOOLS:
    description: 'Value passed to Claude Code --allowedTools to pre-approve tools in headless CI (no interactive prompts). Comma-separated list, e.g. `Bash(gh api:*),Read,Write`. Leave empty to keep default Claude Code permissions (which will pause waiting for approval on write-mode Bash in CI).'
    required: false
    default: ''
  SKIP_PERMISSIONS:
    description: 'Set to "true" to pass --dangerously-skip-permissions, auto-approving every tool call. Simpler than ALLOWED_TOOLS but removes all safeguards — use only in tightly-scoped CI actions with minimally-scoped credentials.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Compose prompt
      id: compose
      shell: bash
      env:
        PROMPT: ${{ inputs.PROMPT }}
        FILES: ${{ inputs.FILES }}
      run: |
        FULL_PROMPT="$PROMPT"
        if [ -n "$FILES" ]; then
          FILES_LIST=$(printf '%s' "$FILES" | sed '/^[[:space:]]*$/d' | sed 's/^/- /')
          FULL_PROMPT="${FULL_PROMPT}"$'\n\n'"Files to examine:"$'\n'"${FILES_LIST}"
        fi
        DELIMITER="PROMPT_EOF_$(openssl rand -hex 8)"
        {
          echo "prompt<<$DELIMITER"
          printf '%s\n' "$FULL_PROMPT"
          echo "$DELIMITER"
        } >> "$GITHUB_OUTPUT"

    - name: Compose claude_args
      id: args
      shell: bash
      env:
        MODEL: ${{ inputs.MODEL }}
        ALLOWED_TOOLS: ${{ inputs.ALLOWED_TOOLS }}
        SKIP_PERMISSIONS: ${{ inputs.SKIP_PERMISSIONS }}
      run: |
        ARGS="--model $MODEL"
        if [ "$SKIP_PERMISSIONS" = "true" ]; then
          ARGS="$ARGS --dangerously-skip-permissions"
        elif [ -n "$ALLOWED_TOOLS" ]; then
          ARGS="$ARGS --allowedTools $ALLOWED_TOOLS"
        fi
        echo "args=$ARGS" >> "$GITHUB_OUTPUT"

    - name: Run Claude agent
      uses: anthropics/claude-code-action@b4d67413279fc18c6e5de930ae307c4f108714eb  # v1
      with:
        prompt: ${{ steps.compose.outputs.prompt }}
        anthropic_api_key: ${{ inputs.ANTHROPIC_API_KEY }}
        github_token: ${{ inputs.GITHUB_TOKEN }}
        claude_args: ${{ steps.args.outputs.args }}
        display_report: 'true'
