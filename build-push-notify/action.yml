name: Update image in registry
description: Build and push image to registry and notify on Mattermost
inputs:
  IMAGE_NAME:
    description: 'Name of the image to build and push'
    required: true
  IMAGE_TAGS:
    description: 'Tags of the image to build and push (one per line)'
    required: true
  REGISTRY_URL:
    description: 'URL of the registry'
    required: true
  REGISTRY_USERNAME:
    description: 'Username to login to registry'
    required: true
  REGISTRY_PASSWORD:
    description: 'Password to login to registry'
    required: true
  MATTERMOST_WEBHOOK_URL:
    description: 'Webhook URL to send notifications on Mattermost. If not provided, notifications will not be sent'
    required: false
  PLATFORMS:
    description: 'Platforms to build the image for'
    required: true
    default: 'linux/amd64'
  CONTEXT:
    description: 'Path to the Dockerfile'
    required: true
    default: './'
  DOCKERFILE:
    description: 'Name of the Dockerfile'
    required: true
    default: 'Dockerfile'
  BUILD_ARGS:
    description: 'Build arguments to pass to the Dockerfile'
    required: true
    default: ''
  TARGET:
    description: 'Target stage to build'
    required: false
  PRE_BUILD_COMMANDS:
    description: 'Optional commands to run before the build'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Install curl, jq and buildah
      run: |
        pkgs=""
        which curl > /dev/null || pkgs="$pkgs curl"
        which jq   > /dev/null || pkgs="$pkgs jq"
        which buildah > /dev/null || pkgs="$pkgs buildah"
        if [ -n "$pkgs" ]; then
          sudo apt-get update && sudo apt-get install -y $pkgs
        fi
      shell: bash
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Login to registry
      env:
        REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
        REGISTRY_USERNAME: ${{ inputs.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ inputs.REGISTRY_PASSWORD }}
      run: |
        echo "$REGISTRY_PASSWORD" | buildah login -u "$REGISTRY_USERNAME" --password-stdin "$REGISTRY_URL"
      shell: bash
    - name: Run pre-build commands
      if: ${{ inputs.PRE_BUILD_COMMANDS != '' }}
      env:
        PRE_BUILD_COMMANDS: ${{ inputs.PRE_BUILD_COMMANDS }}
      run: |
        while IFS= read -r cmd; do
          [ -n "$cmd" ] && eval "$cmd"
        done <<< "$PRE_BUILD_COMMANDS"
      shell: bash
    - name: Build and push
      env:
        IMAGE_TAGS: ${{ inputs.IMAGE_TAGS }}
        PLATFORMS: ${{ inputs.PLATFORMS }}
        CONTEXT: ${{ inputs.CONTEXT }}
        DOCKERFILE: ${{ inputs.DOCKERFILE }}
        BUILD_ARGS: ${{ inputs.BUILD_ARGS }}
        TARGET: ${{ inputs.TARGET }}
      run: |
        # Assemble --build-arg flags
        buildarg_args=()
        while IFS= read -r arg; do
          [ -n "$arg" ] && buildarg_args+=(--build-arg "$arg")
        done <<< "$BUILD_ARGS"

        # Assemble --target flag
        target_args=()
        [ -n "$TARGET" ] && target_args+=(--target "$TARGET")

        if [[ "$PLATFORMS" == *","* ]]; then
          # Multi-platform: build a manifest list, then push to each tag
          buildah build \
            --manifest local-manifest \
            --platform "$PLATFORMS" \
            -f "$DOCKERFILE" \
            "${buildarg_args[@]}" \
            "${target_args[@]}" \
            "$CONTEXT"
          while IFS= read -r tag; do
            [ -n "$tag" ] && buildah manifest push --all local-manifest "docker://$tag"
          done <<< "$IMAGE_TAGS"
        else
          # Single platform: build with explicit tags, then push each
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(-t "$tag")
          done <<< "$IMAGE_TAGS"
          buildah build \
            "${tag_args[@]}" \
            --platform "$PLATFORMS" \
            -f "$DOCKERFILE" \
            "${buildarg_args[@]}" \
            "${target_args[@]}" \
            "$CONTEXT"
          while IFS= read -r tag; do
            [ -n "$tag" ] && buildah push "$tag"
          done <<< "$IMAGE_TAGS"
        fi
      shell: bash
    - name : Send notification on Mattermost
      if: ${{ inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        IMAGE_TAGS: ${{ inputs.IMAGE_TAGS }}
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
      run: |
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="docker image $IMAGE_TAGS has been updated on registry. [Click here to see job on GitHub]($JOB_URL) "
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
    - name : Send failure notification on Mattermost
      if: ${{ failure() && inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        IMAGE_TAGS: ${{ inputs.IMAGE_TAGS }}
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
      run: |
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="Error : docker image  $IMAGE_TAGS has not been updated on registry. [Click here to see job on GitHub]($JOB_URL)"
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
