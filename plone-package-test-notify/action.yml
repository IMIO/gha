name: Run code analysis
description: Run code analysis and notify on Mattermost
inputs:
  BUILDOUT_COMMAND:
    description: 'Command to run buildout'
    required: true
    default: "buildout"
  BUILDOUT_CONFIG_FILE:
    description: 'Path to buildout configuration file'
    required: true
    default: "buildout.cfg"
  BUILDOUT_OPTIONS:
    description: 'Options to pass to buildout'
    required: false
    default: ""
  CACHE_KEY:
    description: 'Cache key'
    required: false
  INSTALL_DEPENDENCIES_COMMANDS:
    description: 'Commands to install dependencies'
    required: false
  MATTERMOST_WEBHOOK_URL:
    description: 'Webhook URL to send notifications on Mattermost, if not provided, notifications will not be sent'
    required: false
  PYTHON_VERSION:
    description: 'Python version to use'
    required: true
    default: "3.13"
  TEST_COMMAND:
    description: 'Command to run tests'
    required: true
    default: "bin/test"
  UV_VERSION:
    description: 'Version of uv to use'
    required: true
    default: "0.7.13"
runs:
  using: 'composite'
  steps:
    - name: Install curl and git
      run: |
        if which curl > /dev/null && which git > /dev/null && which jq > /dev/null; then
          echo "curl, git and jq are already installed"
        else
          sudo apt-get update && sudo apt-get install -y curl git jq
        fi
      shell: bash
    - name: Checkout
      uses: actions/checkout@v4
    - name: Cache eggs
      if: ${{ inputs.CACHE_KEY != '' }}
      uses: actions/cache@v4
      env:
        cache-name: cache-eggs
      with:
        path: ./eggs
        key: ${{ inputs.CACHE_KEY }}
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ inputs.PYTHON_VERSION }}
        version: ${{ inputs.UV_VERSION }}
    - name: Install dependencies
      if: ${{ inputs.INSTALL_DEPENDENCIES_COMMANDS != '' }}
      env:
        INSTALL_DEPENDENCIES_COMMANDS: ${{ inputs.INSTALL_DEPENDENCIES_COMMANDS }}
      shell: bash
      run: |
        IFS=$'\n' read -r -d '' -a commands <<< "$INSTALL_DEPENDENCIES_COMMANDS" || true
        errors=0
        for command in "${commands[@]}"; do
          echo "Running command: $command"
          $command || errors=$((errors + 1))
        done
        [ "$errors" -eq 0 ]
    - name: Run buildout
      env:
        BUILDOUT_COMMAND: ${{ inputs.BUILDOUT_COMMAND }}
        BUILDOUT_OPTIONS: ${{ inputs.BUILDOUT_OPTIONS }}
        BUILDOUT_CONFIG_FILE: ${{ inputs.BUILDOUT_CONFIG_FILE }}
      shell: bash
      run: |
        $BUILDOUT_COMMAND $BUILDOUT_OPTIONS -c "$BUILDOUT_CONFIG_FILE" buildout:eggs-directory=./eggs
    - name: Run tests
      id: test
      env:
        TEST_COMMAND: ${{ inputs.TEST_COMMAND }}
      shell: bash
      run: |
        eval "$TEST_COMMAND"
    - name: Notify on Mattermost
      if: always()
      uses: imio/gha/mattermost-notify@rework/mattermost-notifications
      with:
        MATTERMOST_WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
        STATUS: ${{ steps.test.outcome == 'success' && 'success' || 'failure' }}
        TITLE: "Plone Package Test"
        BODY: |
          **Repository:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
          **Branch:** ${{ github.ref_name }}
          **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Test command:** ${{ inputs.TEST_COMMAND }}
          **Python version:** ${{ inputs.PYTHON_VERSION }}
