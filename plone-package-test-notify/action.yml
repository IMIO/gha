name: Run code analysis
description: Run code analysis and notify on Mattermost
inputs:
  BUILDOUT_COMMAND:
    description: 'Command to run buildout'
    required: true
    default: "buildout"
  BUILDOUT_CONFIG_FILE:
    description: 'Path to buildout configuration file'
    required: true
    default: "buildout.cfg"
  BUILDOUT_OPTIONS:
    description: 'Options to pass to buildout'
    required: false
    default: ""
  CACHE_KEY:
    description: 'Cache key'
    required: false
  INSTALL_DEPENDENCIES_COMMANDS:
    description: 'Commands to install dependencies'
    required: false
  MATTERMOST_WEBHOOK_URL:
    description: 'Webhook URL to send notifications on Mattermost, if not provided, notifications will not be sent'
    required: false
  PYTHON_VERSION:
    description: 'Python version to use'
    required: true
    default: "3.13"
  TEST_COMMAND:
    description: 'Command to run tests'
    required: true
    default: "bin/test"
  UV_VERSION:
    description: 'Version of uv to use'
    required: true
    default: "0.7.13"
runs:
  using: 'composite'
  steps:
    - name: Install curl and git
      run: |
        if which curl > /dev/null && which git > /dev/null && which jq > /dev/null; then
          echo "curl, git and jq are already installed"
        else
          sudo apt-get update && sudo apt-get install -y curl git jq
        fi
      shell: bash
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Cache eggs
      if: ${{ inputs.CACHE_KEY != '' }}
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      env:
        cache-name: cache-eggs
      with:
        path: ./eggs
        key: ${{ inputs.CACHE_KEY }}
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      with:
        python-version: ${{ inputs.PYTHON_VERSION }}
        version: ${{ inputs.UV_VERSION }}
    - name: Install dependencies
      if: ${{ inputs.INSTALL_DEPENDENCIES_COMMANDS != '' }}
      env:
        INSTALL_DEPENDENCIES_COMMANDS: ${{ inputs.INSTALL_DEPENDENCIES_COMMANDS }}
      shell: bash
      run: |
        IFS=$'\n' read -r -d '' -a commands <<< "$INSTALL_DEPENDENCIES_COMMANDS" || true
        errors=0
        for command in "${commands[@]}"; do
          echo "Running command: $command"
          bash -c "$command" || errors=$((errors + 1))
        done
        [ "$errors" -eq 0 ]
    - name: Run buildout
      env:
        BUILDOUT_COMMAND: ${{ inputs.BUILDOUT_COMMAND }}
        BUILDOUT_OPTIONS: ${{ inputs.BUILDOUT_OPTIONS }}
        BUILDOUT_CONFIG_FILE: ${{ inputs.BUILDOUT_CONFIG_FILE }}
      shell: bash
      run: |
        read -ra buildout_cmd <<< "$BUILDOUT_COMMAND"
        read -ra buildout_opts <<< "$BUILDOUT_OPTIONS"
        "${buildout_cmd[@]}" "${buildout_opts[@]}" -c "$BUILDOUT_CONFIG_FILE" buildout:eggs-directory=./eggs
    - name: Run tests
      env:
        TEST_COMMAND: ${{ inputs.TEST_COMMAND }}
      shell: bash
      run: |
        eval "cmd=($TEST_COMMAND)"
        "${cmd[@]}"
    - name : Send notification on Mattermost
      if: ${{ inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        TEST_COMMAND: ${{ inputs.TEST_COMMAND }}
        PYTHON_VERSION: ${{ inputs.PYTHON_VERSION }}
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
        REPOSITORY: ${{ github.repository }}
        SERVER_URL: ${{ github.server_url }}
        REF_NAME: ${{ github.ref_name }}
        SHA: ${{ github.sha }}
      run: |
        ESCAPED_COMMAND=$(echo "$TEST_COMMAND" | sed 's/\\/\\\\/g')
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="Test has run successfully. ([Repository: $REPOSITORY]($SERVER_URL/$REPOSITORY), Branch: $REF_NAME, [View commit on GitHub]($SERVER_URL/$REPOSITORY/commit/$SHA), Test command: $ESCAPED_COMMAND, Python version: $PYTHON_VERSION) [Click here to see job on GitHub]($JOB_URL)"
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
    - name : Send failure notification on Mattermost
      if: ${{ failure() && inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        TEST_COMMAND: ${{ inputs.TEST_COMMAND }}
        PYTHON_VERSION: ${{ inputs.PYTHON_VERSION }}
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
        REPOSITORY: ${{ github.repository }}
        SERVER_URL: ${{ github.server_url }}
        REF_NAME: ${{ github.ref_name }}
        SHA: ${{ github.sha }}
      run: |
        ESCAPED_COMMAND=$(echo "$TEST_COMMAND" | sed 's/\\/\\\\/g')
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="Error : Test has failed. ([Repository: $REPOSITORY]($SERVER_URL/$REPOSITORY), Branch: $REF_NAME, [View commit on GitHub]($SERVER_URL/$REPOSITORY/commit/$SHA), Test command: $ESCAPED_COMMAND, Python version: $PYTHON_VERSION) [Click here to see job on GitHub]($JOB_URL)"
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
