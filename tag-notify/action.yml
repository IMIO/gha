name: Tag image in registry
description: Tag an image on registry and notify on Mattermost
inputs:
  IMAGE_NAME:
    description: 'Name of the image to tag'
    required: true
  IMAGE_TAG:
    description: 'Actual tag of the image'
    required: true
    default: 'staging'
  NEW_IMAGE_TAGS:
    description: 'New tags of the image'
    required: true
    default: 'latest'
  REGISTRY_URL:
    description: 'URL of the registry'
    required: true
  REGISTRY_USERNAME:
    description: 'Username to login to registry'
    required: true
  REGISTRY_PASSWORD:
    description: 'Password to login to registry'
    required: true
  MATTERMOST_WEBHOOK_URL:
    description: 'Webhook URL to send notifications on Mattermost, if not provided, notifications will not be sent'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Install curl, jq and buildah
      run: |
        pkgs=""
        which curl    > /dev/null || pkgs="$pkgs curl"
        which jq      > /dev/null || pkgs="$pkgs jq"
        which buildah > /dev/null || pkgs="$pkgs buildah"
        if [ -n "$pkgs" ]; then
          sudo apt-get update && sudo apt-get install -y $pkgs
        fi
      shell: bash
    - name: Configure rootless buildah
      run: |
        grep -q "runner:" /etc/subuid 2>/dev/null || echo "runner:100000:65536" | sudo tee -a /etc/subuid
        grep -q "runner:" /etc/subgid 2>/dev/null || echo "runner:100000:65536" | sudo tee -a /etc/subgid
      shell: bash
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Login to registry
      env:
        REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
        REGISTRY_USERNAME: ${{ inputs.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ inputs.REGISTRY_PASSWORD }}
        BUILDAH_ISOLATION: chroot
      run: |
        echo "$REGISTRY_PASSWORD" | buildah login -u "$REGISTRY_USERNAME" --password-stdin "$REGISTRY_URL"
      shell: bash
    - name: Download image
      env:
        REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
        BUILDAH_ISOLATION: chroot
      run: buildah pull "$REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG"
      shell: bash
    - name: Tag image
      env:
        REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
        NEW_IMAGE_TAGS: ${{ inputs.NEW_IMAGE_TAGS }}
        BUILDAH_ISOLATION: chroot
      run: |
        set +e
        IFS=$'\n' read -r -d '' -a tags <<< "$NEW_IMAGE_TAGS"
        for tag in "${tags[@]}"; do
          echo "Tagging image with tag $tag"
          buildah tag "$REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG" "$REGISTRY_URL/$IMAGE_NAME:$tag"
        done
      shell: bash
    - name: Push image
      env:
        REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        NEW_IMAGE_TAGS: ${{ inputs.NEW_IMAGE_TAGS }}
        BUILDAH_ISOLATION: chroot
      run: |
        set +e
        IFS=$'\n' read -r -d '' -a tags <<< "$NEW_IMAGE_TAGS"
        for tag in "${tags[@]}"; do
          buildah push "$REGISTRY_URL/$IMAGE_NAME:$tag"
        done
      shell: bash
    - name : Send notification on Mattermost
      if: ${{ inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
        NEW_IMAGE_TAGS: ${{ inputs.NEW_IMAGE_TAGS }}
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
      run: |
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="docker image $IMAGE_NAME:$IMAGE_TAG has been tagged with $NEW_IMAGE_TAGS on registry. [Click here to see job on GitHub]($JOB_URL) "
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
    - name : Send failure notification on Mattermost
      if: ${{ failure() && inputs.MATTERMOST_WEBHOOK_URL != '' }}
      env:
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
        NEW_IMAGE_TAGS: ${{ inputs.NEW_IMAGE_TAGS }}
        WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
      run: |
        JOB_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        MESSAGE="Error : docker image  $IMAGE_NAME:$IMAGE_TAG has not been been tagged with $NEW_IMAGE_TAGS on registry. [Click here to see job on GitHub]($JOB_URL)"
        curl -i -X POST -H 'Content-Type: application/json' \
          -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')" \
          "$WEBHOOK_URL"
      shell: bash
