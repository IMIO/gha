name: Tag image in registry
description: Tag an image on registry and notify on Mattermost
inputs:
  IMAGE_NAME:
    description: 'Name of the image to tag'
    required: true
  IMAGE_TAG:
    description: 'Actual tag of the image'
    required: true
    default: 'staging'
  NEW_IMAGE_TAGS:
    description: 'New tags of the image'
    required: true
    default: 'latest'
  REGISTRY_URL:
    description: 'URL of the registry'
    required: true
  REGISTRY_USERNAME:
    description: 'Username to login to registry'
    required: true
  REGISTRY_PASSWORD:
    description: 'Password to login to registry'
    required: true
  MATTERMOST_WEBHOOK_URL:
    description: 'Webhook URL to send notifications on Mattermost, if not provided, notifications will not be sent'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Install curl and jq
      run: |
        if which curl > /dev/null && which jq > /dev/null; then
          echo "curl and jq are already installed"
        else
          sudo apt-get update && sudo apt-get install -y curl jq
        fi
      shell: bash
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.REGISTRY_URL }}
        username: ${{ inputs.REGISTRY_USERNAME }}
        password: ${{ inputs.REGISTRY_PASSWORD }}
    - name: Download image
      env:
        REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
      run: docker pull "$REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG"
      shell: bash
    - name: Tag image
      env:
        REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
        NEW_IMAGE_TAGS: ${{ inputs.NEW_IMAGE_TAGS }}
      run: |
        set +e
        IFS=$'\n' read -r -d '' -a tags <<< "$NEW_IMAGE_TAGS"
        for tag in "${tags[@]}"; do
          echo "Tagging image with tag $tag"
          docker tag "$REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG" "$REGISTRY_URL/$IMAGE_NAME:$tag"
        done
      shell: bash
    - name: Push image
      id: push
      env:
        REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
        IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
        NEW_IMAGE_TAGS: ${{ inputs.NEW_IMAGE_TAGS }}
      run: |
        set +e
        IFS=$'\n' read -r -d '' -a tags <<< "$NEW_IMAGE_TAGS"
        for tag in "${tags[@]}"; do
          docker push "$REGISTRY_URL/$IMAGE_NAME:$tag";
        done
      shell: bash
    - name: Notify on Mattermost
      if: always()
      uses: imio/gha/mattermost-notify@rework/mattermost-notifications
      with:
        MATTERMOST_WEBHOOK_URL: ${{ inputs.MATTERMOST_WEBHOOK_URL }}
        STATUS: ${{ steps.push.outcome == 'success' && 'success' || 'failure' }}
        TITLE: "Docker Image Tag"
        BODY: |
          **Image:** ${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG }}
          **New tags:** ${{ inputs.NEW_IMAGE_TAGS }}
          **Branch:** ${{ github.ref_name }}
